<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Post Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; color: #0f0f0f; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  body.dark { background: #181818; color: #f1f1f1; }

  /* HEADER */
  #header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.08); flex-shrink: 0; }
  body.dark #header { background: #1a1a1a; border-color: #2a2a2a; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .header-sub { font-size: 12px; color: #606060; font-weight: 500; }
  body.dark .header-sub { color: #aaa; }
  .header-btns { display: flex; gap: 8px; }
  .btn { background: #f8f8f8; border: 1px solid #e0e0e0; border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: 12px; font-weight: 500; color: #0f0f0f; transition: all 0.2s; }
  .btn:hover { background: #ebebeb; }
  body.dark .btn { background: #272727; border-color: #2a2a2a; color: #f1f1f1; }
  body.dark .btn:hover { background: #333; }

  /* LAYOUT */
  #main { display: flex; flex: 1; overflow: hidden; }

  /* LEFT PANEL */
  #left { width: 330px; min-width: 330px; background: #fff; border-right: 1px solid #e0e0e0; overflow-y: auto; padding: 18px; }
  body.dark #left { background: #1a1a1a; border-color: #2a2a2a; }

  .section-label { font-size: 10px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: #606060; margin-bottom: 10px; }
  body.dark .section-label { color: #aaa; }
  .divider { height: 1px; background: #e0e0e0; margin: 18px 0; }
  body.dark .divider { background: #2a2a2a; }

  .inp { width: 100%; padding: 9px 11px; border-radius: 8px; border: 1px solid #e0e0e0; background: #f8f8f8; color: #0f0f0f; font-size: 13px; outline: none; font-family: inherit; transition: border 0.2s; }
  .inp:focus { border-color: #ff0000; }
  body.dark .inp { background: #272727; border-color: #2a2a2a; color: #f1f1f1; }
  body.dark .inp:focus { border-color: #ff0000; }
  textarea.inp { resize: vertical; line-height: 1.5; }
  .char-count { font-size: 11px; color: #aaa; margin-top: 4px; }

  .grad-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .grad-btn { width: 36px; height: 36px; border-radius: 10px; border: 3px solid transparent; cursor: pointer; transition: border 0.15s, transform 0.1s; }
  .grad-btn:hover { transform: scale(1.1); }
  .grad-btn.active { border-color: #ff0000; }

  .emoji-grid { display: flex; flex-wrap: wrap; gap: 7px; }
  .emoji-btn { width: 36px; height: 36px; border-radius: 10px; border: 2px solid transparent; cursor: pointer; font-size: 19px; background: #f8f8f8; transition: all 0.15s; }
  .emoji-btn:hover { transform: scale(1.15); }
  .emoji-btn.active { border-color: #ff0000; background: #ffe5e5; }
  body.dark .emoji-btn { background: #272727; }
  body.dark .emoji-btn.active { background: #3a1010; }

  .row2 { display: flex; gap: 10px; }
  .row2 > div { flex: 1; }
  .sub-label { font-size: 11px; color: #606060; margin-bottom: 6px; }
  body.dark .sub-label { color: #aaa; }

  /* RIGHT PANEL */
  #right { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; overflow-y: auto; background: #e8e8e8; }
  body.dark #right { background: #111; }
  .preview-label { font-size: 10px; color: #bbb; margin-bottom: 18px; letter-spacing: 1px; }
  body.dark .preview-label { color: #444; }

  /* CARD */
  #card { width: 100%; max-width: 490px; background: #fff; border-radius: 14px; overflow: hidden; box-shadow: 0 12px 50px rgba(0,0,0,0.18); }
  body.dark #card { background: #1f1f1f; }

  /* THUMBNAIL */
  #thumb { position: relative; width: 100%; padding-bottom: 56.25%; overflow: hidden; }
  #thumb-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
  .deco1 { position: absolute; top: -40px; right: -40px; width: 200px; height: 200px; border-radius: 50%; background: rgba(255,255,255,0.08); }
  .deco2 { position: absolute; bottom: -60px; left: -30px; width: 250px; height: 250px; border-radius: 50%; background: rgba(0,0,0,0.12); }
  #thumb-emoji { font-size: 76px; filter: drop-shadow(0 6px 16px rgba(0,0,0,0.5)); z-index: 2; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -55%); }
  #thumb-text { position: absolute; bottom: 12px; left: 12px; right: 55px; font-size: 20px; font-weight: 900; color: white; text-shadow: 2px 3px 10px rgba(0,0,0,0.9); line-height: 1.2; z-index: 2; display: none; }
  #duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.85); color: white; padding: 2px 7px; border-radius: 4px; font-size: 12px; font-weight: 700; z-index: 3; }

  /* INFO */
  #info { padding: 14px 16px 18px; }
  #info-row { display: flex; gap: 12px; align-items: flex-start; }
  #avatar { width: 36px; height: 36px; min-width: 36px; border-radius: 50%; background: linear-gradient(135deg, #ff0000, #cc0000); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
  #info-body { flex: 1; }
  #card-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; color: #0f0f0f; }
  body.dark #card-title { color: #f1f1f1; }
  #card-title.placeholder { color: #aaa; font-weight: 400; font-style: italic; }
  #card-meta { font-size: 13px; color: #606060; }
  body.dark #card-meta { color: #aaa; }
  #card-desc { font-size: 13px; color: #606060; margin-top: 10px; line-height: 1.5; border-top: 1px solid #e0e0e0; padding-top: 10px; display: none; }
  body.dark #card-desc { color: #aaa; border-color: #2a2a2a; }

  #yt-footer { text-align: center; margin-top: 18px; opacity: 0.6; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-left">
    <svg viewBox="0 0 120 26" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:22px;width:auto">
      <rect x="0" y="2" width="34" height="22" rx="5" fill="#FF0000"/>
      <polygon points="13,8 24,14 13,20" fill="white"/>
      <text x="40" y="20" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="#282828">YouTube</text>
    </svg>
    <span class="header-sub">Post Generator</span>
  </div>
  <div class="header-btns">
    <button class="btn" onclick="toggleDark()">🌙 Dark</button>
    <button class="btn" onclick="resetAll()">Reset</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- LEFT -->
  <div id="left">

    <div class="section-label">🎨 Thumbnail Background</div>
    <div class="grad-grid" id="grad-grid"></div>

    <div class="divider"></div>

    <div class="section-label">😎 Thumbnail Icon</div>
    <div class="emoji-grid" id="emoji-grid"></div>

    <div class="divider"></div>

    <div class="section-label">✍️ Text on Thumbnail</div>
    <input class="inp" id="thumb-text-inp" type="text" placeholder="e.g. YOU WON'T BELIEVE THIS..." oninput="updateThumbText()">

    <div class="divider"></div>

    <div class="section-label">📺 Channel Name</div>
    <input class="inp" id="channel-inp" type="text" value="YourChannel" oninput="updateMeta()">

    <div class="divider"></div>

    <div class="section-label">📝 Video Title</div>
    <textarea class="inp" id="title-inp" rows="3" placeholder="Write your video title here..." oninput="updateTitle(); countChars('title-inp','title-count',100)" maxlength="100"></textarea>
    <div class="char-count"><span id="title-count">0</span> / 100</div>

    <div class="divider"></div>

    <div class="section-label">📋 Description</div>
    <textarea class="inp" id="desc-inp" rows="5" placeholder="Add a description..." oninput="updateDesc(); countChars('desc-inp','desc-count',300)" maxlength="300"></textarea>
    <div class="char-count"><span id="desc-count">0</span> / 300</div>

    <div class="divider"></div>

    <div class="section-label">📊 Stats</div>
    <div class="row2">
      <div>
        <div class="sub-label">Views</div>
        <input class="inp" id="views-inp" type="text" value="1.2M" oninput="updateMeta()">
      </div>
      <div>
        <div class="sub-label">Posted</div>
        <input class="inp" id="time-inp" type="text" value="2 days ago" oninput="updateMeta()">
      </div>
    </div>

  </div>

  <!-- RIGHT -->
  <div id="right">
    <div class="preview-label">LIVE PREVIEW</div>

    <div id="card">
      <div id="thumb">
        <div id="thumb-inner">
          <div class="deco1"></div>
          <div class="deco2"></div>
          <div id="thumb-emoji">🎬</div>
          <div id="thumb-text"></div>
          <div id="duration">10:24</div>
        </div>
      </div>
      <div id="info">
        <div id="info-row">
          <div id="avatar">Y</div>
          <div id="info-body">
            <div id="card-title" class="placeholder">Your video title will appear here</div>
            <div id="card-meta">YourChannel · 1.2M views · 2 days ago</div>
            <div id="card-desc"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="yt-footer">
      <svg viewBox="0 0 120 26" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:18px;width:auto">
        <rect x="0" y="2" width="34" height="22" rx="5" fill="#FF0000"/>
        <polygon points="13,8 24,14 13,20" fill="white"/>
        <text x="40" y="20" font-family="Arial,sans-serif" font-weight="bold" font-size="18" fill="#282828">YouTube</text>
      </svg>
    </div>
  </div>
</div>

<script>
  const GRADIENTS = [
    "linear-gradient(135deg,#ff4e50,#f9d423)",
    "linear-gradient(135deg,#0072ff,#00c6ff)",
    "linear-gradient(135deg,#1a1a2e,#0f3460)",
    "linear-gradient(135deg,#134e5e,#71b280)",
    "linear-gradient(135deg,#f7971e,#ffd200)",
    "linear-gradient(135deg,#f953c6,#b91d73)",
    "linear-gradient(135deg,#7f00ff,#e100ff)",
    "linear-gradient(135deg,#232526,#414345)",
  ];
  const EMOJIS = ["🎬","🔥","💡","🚀","🎮","💰","😱","🏆","🎵","✨","💥","🤯"];

  let currentGrad = 0;
  let currentEmoji = "🎬";
  let isDark = false;

  // Build gradient buttons
  const gg = document.getElementById('grad-grid');
  GRADIENTS.forEach((g, i) => {
    const b = document.createElement('button');
    b.className = 'grad-btn' + (i === 0 ? ' active' : '');
    b.style.background = g;
    b.title = "Gradient " + (i+1);
    b.onclick = () => {
      currentGrad = i;
      document.querySelectorAll('.grad-btn').forEach((x,j) => x.classList.toggle('active', j===i));
      document.getElementById('thumb-inner').style.background = GRADIENTS[i];
    };
    gg.appendChild(b);
  });
  document.getElementById('thumb-inner').style.background = GRADIENTS[0];

  // Build emoji buttons
  const eg = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => {
    const b = document.createElement('button');
    b.className = 'emoji-btn' + (e === '🎬' ? ' active' : '');
    b.textContent = e;
    b.onclick = () => {
      currentEmoji = e;
      document.querySelectorAll('.emoji-btn').forEach(x => x.classList.toggle('active', x.textContent === e));
      document.getElementById('thumb-emoji').textContent = e;
    };
    eg.appendChild(b);
  });

  function updateThumbText() {
    const val = document.getElementById('thumb-text-inp').value;
    const el = document.getElementById('thumb-text');
    el.textContent = val;
    el.style.display = val ? 'block' : 'none';
  }

  function updateTitle() {
    const val = document.getElementById('title-inp').value;
    const el = document.getElementById('card-title');
    if (val) {
      el.textContent = val;
      el.classList.remove('placeholder');
    } else {
      el.textContent = 'Your video title will appear here';
      el.classList.add('placeholder');
    }
  }

  function updateDesc() {
    const val = document.getElementById('desc-inp').value;
    const el = document.getElementById('card-desc');
    if (val) {
      el.textContent = val.length > 130 ? val.slice(0,130)+'...' : val;
      el.style.display = 'block';
    } else {
      el.style.display = 'none';
    }
  }

  function updateMeta() {
    const ch = document.getElementById('channel-inp').value || 'YourChannel';
    const v = document.getElementById('views-inp').value || '0';
    const t = document.getElementById('time-inp').value || 'just now';
    document.getElementById('card-meta').textContent = ch + ' · ' + v + ' views · ' + t;
    document.getElementById('avatar').textContent = ch[0].toUpperCase();
  }

  function countChars(inputId, countId, max) {
    const len = document.getElementById(inputId).value.length;
    document.getElementById(countId).textContent = len;
  }

  function toggleDark() {
    isDark = !isDark;
    document.body.classList.toggle('dark', isDark);
    document.querySelector('.btn').textContent = isDark ? '☀️ Light' : '🌙 Dark';
  }

  function resetAll() {
    document.getElementById('thumb-text-inp').value = '';
    document.getElementById('channel-inp').value = 'YourChannel';
    document.getElementById('title-inp').value = '';
    document.getElementById('desc-inp').value = '';
    document.getElementById('views-inp').value = '1.2M';
    document.getElementById('time-inp').value = '2 days ago';
    document.getElementById('title-count').textContent = '0';
    document.getElementById('desc-count').textContent = '0';
    currentGrad = 0;
    currentEmoji = '🎬';
    document.querySelectorAll('.grad-btn').forEach((x,i) => x.classList.toggle('active', i===0));
    document.querySelectorAll('.emoji-btn').forEach(x => x.classList.toggle('active', x.textContent==='🎬'));
    document.getElementById('thumb-inner').style.background = GRADIENTS[0];
    document.getElementById('thumb-emoji').textContent = '🎬';
    document.getElementById('thumb-text').style.display = 'none';
    document.getElementById('card-title').textContent = 'Your video title will appear here';
    document.getElementById('card-title').classList.add('placeholder');
    document.getElementById('card-desc').style.display = 'none';
    document.getElementById('card-meta').textContent = 'YourChannel · 1.2M views · 2 days ago';
    document.getElementById('avatar').textContent = 'Y';
  }
</script>
</body>
</html>
